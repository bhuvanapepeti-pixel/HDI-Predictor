<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDI Predictor - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <h2>Human Development Index (HDI) Predictor</h2>
                        <p class="mb-0">SmartBridge Machine Learning Project</p>
                    </div>
                    <div class="card-body p-4">
                        <form action="/predict" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Life Expectancy (Years)</label>
                                <input type="number" step="any" name="life_expectancy" class="form-control" placeholder="e.g. 75.5" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mean Years of Schooling</label>
                                <input type="number" step="any" name="schooling" class="form-control" placeholder="e.g. 12.2" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Gross National Income (GNI) Per Capita</label>
                                <input type="number" step="any" name="gni" class="form-control" placeholder="e.g. 15000" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 fs-5">Predict HDI Score</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
                                  </html>
