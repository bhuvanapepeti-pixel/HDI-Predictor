<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDI Predictor - Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg text-center">
                    <div class="card-header bg-dark text-white py-4">
                        <h2>Prediction Result</h2>
                    </div>
                    <div class="card-body p-5">
                        <h4 class="text-muted">The estimated Human Development Index is:</h4>
                        <h1 class="display-3 fw-bold text-{{ alert_color }}">{{ prediction_text }}</h1>
                        
                        <div class="alert alert-{{ alert_color }} mt-4 py-3" role="alert">
                            <h3 class="alert-heading fw-bold">{{ tier_text }}</h3>
                        </div>
                        
                        <a href="/" class="btn btn-outline-primary btn-lg mt-3 fw-bold">Go Back to Home</a>
                    </div>
                    <div class="card-footer text-muted py-3">
                        Project Submission - Team Members: Mahitha, Gopika, Sneha, Jaswanth, Venkatesh
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
